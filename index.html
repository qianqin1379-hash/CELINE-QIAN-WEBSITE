<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Portfolio</title>

<!-- TailwindCSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Vue3 CDN -->
<script src="https://unpkg.com/vue@3"></script>

<!-- Feather Icons -->
<script src="https://unpkg.com/feather-icons"></script>

</head>

<body class="bg-gray-100">

<div id="app" class="h-screen flex items-center justify-center">

<!-- 打开按钮 -->
<button 
@click="showModal = true"
class="px-6 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">
Open Contact Form
</button>

<!-- Modal -->
<div v-if="showModal" class="fixed inset-0 flex items-center justify-center z-50">

<!-- 背景 -->
<div 
class="absolute inset-0 bg-black opacity-50"
@click="showModal=false">
</div>

<!-- Modal内容 -->
<div class="relative bg-white w-96 rounded-lg shadow-lg p-6">

<div class="flex justify-between items-center mb-4">

<h2 class="text-xl font-semibold">
Project Request
</h2>

<button @click="showModal=false">
<i data-feather="x"></i>
</button>

</div>

<form @submit.prevent="submitForm">

<div class="mb-3">
<label class="block mb-1">Full Name</label>
<input 
v-model="form.name"
type="text"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="mb-3">
<label class="block mb-1">Email</label>
<input 
v-model="form.email"
type="email"
class="w-full border rounded px-3 py-2"
required>
</div>

<div class="mb-3">
<label class="block mb-1">Project Type</label>

<select 
v-model="form.project"
class="w-full border rounded px-3 py-2">

<option>Website</option>
<option>SEO Optimization</option>
<option>TikTok Growth</option>
<option>AI Automation</option>

</select>
</div>

<div class="mb-3">

<label class="block mb-1">Details</label>

<textarea 
v-model="form.details"
class="w-full border rounded px-3 py-2"
rows="3">
</textarea>

</div>

<button 
type="submit"
class="w-full bg-indigo-500 text-white py-2 rounded hover:bg-indigo-600">

Send Request

</button>

</form>

</div>

</div>

</div>

<script>

const { createApp } = Vue

createApp({

data(){

return{

showModal:false,

form:{
name:"",
email:"",
project:"",
details:""
}

}

},

methods:{

submitForm(){

alert(
"Form submitted!\n\n" +
"Name: " + this.form.name +
"\nEmail: " + this.form.email +
"\nProject: " + this.form.project
)

this.showModal=false

}

},

mounted(){
feather.replace()
},

updated(){
feather.replace()
}

}).mount("#app")

</script>

</body>
</html>
